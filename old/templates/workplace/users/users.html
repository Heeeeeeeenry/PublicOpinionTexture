<!-- 用户管理页面 -->
<div id="content-users" class="h-full flex flex-col overflow-hidden">
    <!-- 页面标题栏 -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 users-header">
        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">用户管理</h2>
                <p class="text-gray-500 mt-1" id="users-subtitle">管理系统用户账号</p>
            </div>
            <button id="btn-add-user" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition flex items-center">
                <i class="fas fa-plus mr-2"></i>
                新增用户
            </button>
        </div>
    </div>

    <!-- 用户列表 -->
    <div class="bg-white rounded-2xl shadow-sm flex-1 flex flex-col min-h-0">
        <!-- 搜索栏 -->
        <div class="p-4 border-b border-gray-100 search-filter-panel">
            <div class="flex gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="search-input" placeholder="搜索姓名、警号、手机号..."
                           class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <select id="filter-level" class="px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">全部权限</option>
                    <option value="市局">市局</option>
                    <option value="区县局">区县局</option>
                    <option value="民警">民警</option>
                </select>
                <select id="filter-status" class="px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">全部状态</option>
                    <option value="1">已激活</option>
                    <option value="0">已禁用</option>
                </select>
            </div>
        </div>

        <!-- 表格 -->
        <div class="flex-1 overflow-auto">
            <table class="w-full">
                <thead class="bg-gray-50 sticky top-0 z-10">
                    <tr>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">警号</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">姓名</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">昵称</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">权限级别</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">所属单位</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">手机号</th>
                        <th class="px-6 py-4 text-center text-sm font-semibold text-gray-600">状态</th>
                        <th class="px-6 py-4 text-center text-sm font-semibold text-gray-600">操作</th>
                    </tr>
                </thead>
                <tbody id="users-table-body" class="divide-y divide-gray-100">
                    <!-- 数据将通过 JavaScript 动态加载 -->
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="p-4 border-t border-gray-100 flex items-center justify-between pagination-panel shrink-0">
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500" id="pagination-info">共 0 条记录</span>
                <div class="flex items-center gap-2">
                    <label class="text-sm text-gray-500">每页显示：</label>
                    <select id="page-size-select" class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="10">10条</option>
                        <option value="20" selected>20条</option>
                        <option value="50">50条</option>
                        <option value="100">100条</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-2" id="pagination-controls">
                <!-- 分页按钮将通过 JavaScript 动态生成 -->
            </div>
        </div>
    </div>
</div>

<!-- 新增/编辑用户弹窗 -->
<div id="user-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4">
        <div class="p-6 border-b border-gray-100">
            <h3 class="text-lg font-bold text-gray-800" id="modal-title">新增用户</h3>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="user-id">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">警号 <span class="text-red-500">*</span></label>
                    <input type="text" id="input-police-number" placeholder="请输入警号"
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">姓名 <span class="text-red-500">*</span></label>
                    <input type="text" id="input-name" placeholder="请输入姓名"
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">昵称</label>
                    <input type="text" id="input-nickname" placeholder="请输入昵称"
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">手机号</label>
                    <input type="text" id="input-phone" placeholder="请输入手机号"
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">权限级别 <span class="text-red-500">*</span></label>
                <select id="input-permission-level" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">请选择权限级别</option>
                    <option value="市局">市局</option>
                    <option value="区县局">区县局</option>
                    <option value="民警">民警</option>
                </select>
            </div>
            <div id="unit-select-container">
                <label class="block text-sm font-medium text-gray-700 mb-2">所属单位 <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-3 gap-2">
                    <select id="input-unit-level1" class="px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">选择市局</option>
                    </select>
                    <select id="input-unit-level2" class="px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" disabled>
                        <option value="">选择区县局</option>
                    </select>
                    <select id="input-unit-level3" class="px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" disabled>
                        <option value="">选择科室所队</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">密码 <span id="password-required" class="text-red-500">*</span></label>
                <input type="password" id="input-password" placeholder="请输入密码"
                       class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-500 mt-1" id="password-hint">编辑时留空表示不修改密码</p>
            </div>
            <div class="flex items-center">
                <input type="checkbox" id="input-is-active" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="input-is-active" class="ml-2 text-sm text-gray-700">激活账号</label>
            </div>
        </div>
        <div class="p-6 border-t border-gray-100 flex justify-end gap-3">
            <button id="btn-cancel" class="px-5 py-2.5 text-gray-600 hover:bg-gray-100 rounded-xl transition">
                取消
            </button>
            <button id="btn-save" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">
                保存
            </button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div id="delete-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 p-6">
        <div class="text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">确认删除</h3>
            <p class="text-gray-500 mb-6">确定要删除这个用户吗？此操作不可恢复。</p>
            <div class="flex justify-center gap-3">
                <button id="btn-cancel-delete" class="px-5 py-2.5 text-gray-600 hover:bg-gray-100 rounded-xl transition">
                    取消
                </button>
                <button id="btn-confirm-delete" class="px-5 py-2.5 bg-red-600 text-white rounded-xl hover:bg-red-700 transition">
                    删除
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 重置密码弹窗 -->
<div id="reset-password-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 p-6">
        <div class="text-center">
            <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-key text-amber-600 text-2xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">重置密码</h3>
            <p class="text-gray-500 mb-4">请输入新密码</p>
            <input type="password" id="input-new-password" placeholder="请输入新密码"
                   class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 mb-6">
            <div class="flex justify-center gap-3">
                <button id="btn-cancel-reset" class="px-5 py-2.5 text-gray-600 hover:bg-gray-100 rounded-xl transition">
                    取消
                </button>
                <button id="btn-confirm-reset" class="px-5 py-2.5 bg-amber-600 text-white rounded-xl hover:bg-amber-700 transition">
                    确认重置
                </button>
            </div>
        </div>
    </div>
</div>
